# Puerto de ejecución del microservicio
server.port=8081

# Configuración de base de datos en memoria H2
spring.datasource.url=jdbc:h2:mem:ordersdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar consola H2 para validaciones
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.defer-datasource-initialization=true

# =========================================================================
# Configuración de SQS / LocalStack (sobrescribible por variables de entorno
# para funcionar tanto en local como dentro de contenedores Docker)
# =========================================================================
aws.region=${AWS_REGION:us-east-1}
aws.sqs.endpoint=${AWS_SQS_ENDPOINT:http://localhost:4566}
aws.sqs.queue-name=${AWS_SQS_QUEUE_NAME:fasttrack-notification-queue}
